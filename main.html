<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/style-main.css">
    <link rel="stylesheet" href="styles/style-navbar.css">
    <link rel="stylesheet" href="styles/styles-card.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <img src="assets/logo.png" alt="logo">
        </div>

        <div class="search">
            <img src="assets/lupa.png" alt="buscar" class="icon">
            <input type="text" placeholder="Pesquisar">
        </div>

        <div class="menu">
            <img src="assets/menu.jpg" alt="menu">
        </div>
    </nav>

    <main>
        <section class="cards-area">
            <div class="card">
            <a href="ben10.html" class="card">
                <div class="card-top">
                    <img class="card-img img1" src="assets/ben10_idle.png" alt="Ben 10">
                    <img class="card-img img2" src="assets/4arms.png" alt="4 Arms">
                </div>
                <div class="card-bottom">
                    <span>
                        Ben 10
                    </span>
                </div>
            </a>
            </div>

            <a class="card" href="about-rex.html" style="text-decoration: none;">
                <div class="card-top-rex">
                    <img class="card-img img1" src="assets/rex/mutanteRex_idle.png" alt="Ben 10">
                    <img class="card-img img2" src="assets/rex/punhos_rex.png" alt="4 Arms">
                </div>
                <div class="card-bottom-rex">
                    <span>
                        Mutante Rex
                    </span>
                </div>
            </a>
        </section>
    </main>
</body>

</html>
